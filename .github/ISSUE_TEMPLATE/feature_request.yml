name: Feature request
description: Suggest a focused improvement to zed-workspace-dock.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or unsupported today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should zed-workspace-dock do differently?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: contract
    attributes:
      label: CLI contract
      options:
        - label: This request does not assume an incremental `add` command for registered workspaces.
          required: true
