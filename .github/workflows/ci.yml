name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
      - name: Format
        run: devbox run -- cargo fmt --all -- --check
      - name: Check
        run: devbox run -- cargo check --all-targets --locked
      - name: Clippy
        run: devbox run -- cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Test
        run: devbox run -- cargo test --locked
