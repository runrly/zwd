name: Release PR

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-plz:
    name: Release PR
    runs-on: ubuntu-22.04
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RUNRLY_ECHO_APP_ID }}
          private-key: ${{ secrets.RUNRLY_ECHO_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true
      - name: Run release-plz
        env:
          GIT_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: devbox run -- release-plz release-pr --config release-plz.toml
